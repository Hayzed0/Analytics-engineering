version: 2

sources:
  - name: staging
    database: newyork-taxi-data
    schema: raw_ny_data
    
    tables:
      - name: green_tripdata
      - name: yellow_tripdata

models:
  - name: stg_green_data
    description: "Staging model for green taxi trip data"
    columns:
      - name: tripid
        data_type: string
        tests:
          - unique:
              config:
                severity: warn
          - not_null:
              config:
                severity: warn

      - name: vendorid
        data_type: int64

      - name: ratecodeid
        data_type: int64

      - name: pickup_locationid
        data_type: int64
        tests:
          - relationships:
              arguments:
                to: ref('dim_zone')
                field: locationid
              config:
                severity: warn

      - name: dropoff_locationid
        data_type: int64
        tests:
          - relationships:
              arguments:
                to: ref('dim_zone')
                field: locationid
              config:
                severity: warn

      - name: pickup_datetime
        data_type: timestamp

      - name: dropoff_datetime
        data_type: timestamp

      - name: store_and_fwd_flag
        data_type: string

      - name: passenger_count
        data_type: int64

      - name: trip_distance
        data_type: numeric

      - name: trip_type
        data_type: int64

      - name: fare_amount
        data_type: numeric

      - name: extra
        data_type: numeric

      - name: mta_tax
        data_type: numeric

      - name: tip_amount
        data_type: numeric

      - name: tolls_amount
        data_type: numeric

      - name: ehail_fee
        data_type: numeric

      - name: improvement_surcharge
        data_type: numeric

      - name: total_amount
        data_type: numeric

      - name: payment_type
        data_type: int64
        tests:
          - accepted_values:
              arguments:
                values: "{{ var('payment_type_values') }}"
                quote: false
              config:
                severity: warn

      - name: payment_type_description
        data_type: string

  - name: stg_yellow_data
    description: "Staging model for yellow taxi trip data"
    columns:
      - name: tripid
        data_type: string

      - name: vendorid
        data_type: int64

      - name: ratecodeid
        data_type: int64

      - name: pickup_locationid
        data_type: int64

      - name: dropoff_locationid
        data_type: int64

      - name: pickup_datetime
        data_type: timestamp

      - name: dropoff_datetime
        data_type: timestamp

      - name: store_and_fwd_flag
        data_type: string

      - name: passenger_count
        data_type: int64

      - name: trip_distance
        data_type: numeric

      - name: trip_type
        data_type: int64

      - name: fare_amount
        data_type: numeric

      - name: extra
        data_type: numeric

      - name: mta_tax
        data_type: numeric

      - name: tip_amount
        data_type: numeric

      - name: tolls_amount
        data_type: numeric

      - name: ehail_fee
        data_type: numeric

      - name: improvement_surcharge
        data_type: numeric

      - name: total_amount
        data_type: numeric

      - name: payment_type
        data_type: int64

      - name: payment_type_description
        data_type: string